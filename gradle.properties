# Project-wide Gradle settings.
# IDE (e.g. Android Studio) users:
# Gradle settings configured through the IDE *will override* any settings specified in this file.

# 启用 Gradle Daemon，复用 JVM 与内存缓存
org.gradle.daemon=true

# 启用构建缓存，复用已编译输出
org.gradle.caching=true

# 并行执行独立子项目任务（当前单模块项目收益有限，但启用无额外开销）
org.gradle.parallel=true

# 按需配置子项目
org.gradle.configureondemand=true

# JVM 堆内存，允许 KSP / Room / R8 等大型任务使用更多内存
org.gradle.jvmargs=-Xmx4g -Dfile.encoding=UTF-8

# 非交互式环境避免 Android 构建提示
android.useAndroidX=true
android.enableJetifier=true

# Kotlin 增量编译
kotlin.incremental=true
